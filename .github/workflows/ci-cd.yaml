name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npx eslint src/

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx eslint src/

  lint-worker:
    name: Lint Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8
      - run: cd worker && flake8 --max-line-length=120 *.py

  build-and-push:
    name: Build & Push Docker Images
    needs: [lint-backend, lint-frontend, lint-worker]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [backend, frontend, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ai-task-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKER_USERNAME }}/ai-task-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-infra:
    name: Update Infrastructure Repo
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DOCKER_USERNAME }}/ai-task-platform-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update image tags
        run: |
          cd infra
          for SERVICE in backend frontend worker; do
            # Update image tags in kustomization or deployment files
            find . -name "*.yaml" -exec sed -i \
              "s|image: .*ai-task-${SERVICE}:.*|image: ${{ secrets.DOCKER_USERNAME }}/ai-task-${SERVICE}:${{ env.IMAGE_TAG }}|g" {} \;
          done

      - name: Commit and push
        run: |
          cd infra
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update image tags to ${{ env.IMAGE_TAG }}"
          git push
