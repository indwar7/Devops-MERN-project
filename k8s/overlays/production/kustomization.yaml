apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-task-platform-production

resources:
  - ../../base

namePrefix: prod-

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 5
  - target:
      kind: Ingress
      name: ai-task-ingress
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: ai-task.production.example.com
